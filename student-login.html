<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventFlow — Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        .login-back {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ink3);
            text-decoration: none;
            border: 1px solid var(--rule);
            padding: 6px 12px;
            border-radius: var(--radius);
            transition: all 0.18s;
        }
        .login-back:hover { color: var(--ink); border-color: var(--ink); }

        .login-brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 8px;
        }

        .login-tagline {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--ink3);
            margin-bottom: 32px;
            text-align: center;
        }

        .login-card {
            background: var(--paper);
            border: 1px solid var(--rule);
            border-top: 3px solid var(--accent2);
            border-radius: var(--radius);
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.35s ease both;
            overflow: hidden;
        }

        .login-card-header {
            padding: 22px 24px 18px;
            border-bottom: 1px solid var(--rule);
        }

        .login-card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--ink);
            line-height: 1;
            margin-bottom: 4px;
        }

        .login-card-sub {
            font-size: 0.82rem;
            color: var(--ink3);
        }

        .login-card-body   { padding: 22px 24px; }
        .login-card-footer { padding: 16px 24px; border-top: 1px solid var(--rule); }

        .form-tabs {
            display: flex;
            margin-bottom: 22px;
            border-bottom: 2px solid var(--rule);
        }

        .form-tab {
            padding: 0 0 12px;
            margin-right: 24px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ink3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            transition: all 0.18s;
        }

        .form-tab.active { color: var(--ink); border-bottom-color: var(--ink); }

        .notice {
            display: none;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 18px;
            border-left: 3px solid;
        }
        .notice.error   { display: block; background: #fde0db; color: var(--accent);  border-color: var(--accent); }
        .notice.success { display: block; background: #d9f2e6; color: var(--green);   border-color: var(--green); }
    </style>
</head>
<body>
    <div class="login-wrap">
        <a class="login-back" href="login.html">← Back</a>

        <div class="login-brand">
            <div class="brand-name">EventFlow</div>
            <div class="brand-tag">Capacity Manager</div>
        </div>
        <div class="login-tagline">Student Portal</div>

        <div class="login-card">
            <div class="login-card-header">
                <div class="login-card-title">Welcome Back</div>
                <div class="login-card-sub">Register for events and track your seat bookings.</div>
            </div>
            <div class="login-card-body">
                <div class="form-tabs">
                    <button class="form-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
                    <button class="form-tab"         id="tab-register" onclick="switchTab('register')">Register</button>
                </div>

                <div id="s-notice" class="notice"></div>

                <!-- Login -->
                <div id="form-login">
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-input" id="s-email" placeholder="you@example.com" />
                    </div>
                    <div class="form-group" style="margin-bottom:0">
                        <label class="form-label">Password *</label>
                        <input type="password" class="form-input" id="s-password" placeholder="••••••••" />
                    </div>
                </div>

                <!-- Register -->
                <div id="form-register" style="display:none">
                    <div class="form-group">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-input" id="s-name" placeholder="Your full name" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-input" id="s-reg-email" placeholder="you@example.com" />
                    </div>
                    <div class="form-group" style="margin-bottom:0">
                        <label class="form-label">Password *</label>
                        <input type="password" class="form-input" id="s-reg-password" placeholder="Min. 6 characters" />
                    </div>
                </div>
            </div>
            <div class="login-card-footer">
                <button class="btn-primary" id="s-submit" onclick="handleSubmit()" style="width:100%">Sign In</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000/api/v1";
        let mode = 'login';

        function switchTab(tab) {
            mode = tab;
            document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('s-submit').textContent        = tab === 'login' ? 'Sign In' : 'Create Account';
            clearNotice();
        }

        function clearNotice() {
            const el = document.getElementById('s-notice');
            el.className = 'notice'; el.textContent = '';
        }

        function showNotice(msg, type = 'error') {
            const el = document.getElementById('s-notice');
            el.textContent = msg; el.className = `notice ${type}`;
        }

        function setLoading(loading, label) {
            const btn = document.getElementById('s-submit');
            btn.disabled = loading;
            btn.textContent = loading ? 'Please wait...' : label;
        }

        function handoff(data) {
            sessionStorage.setItem('_ef_handoff', JSON.stringify({ token: data.access_token, user: data.user }));
            window.location.href = 'index.html';
        }

        async function handleSubmit() {
            mode === 'login' ? await doLogin() : await doRegister();
        }

        async function doLogin() {
            const email    = document.getElementById('s-email').value.trim();
            const password = document.getElementById('s-password').value;
            if (!email || !password) { showNotice('Email and password are required.'); return; }

            setLoading(true, 'Sign In');
            try {
                const res  = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role: 'student' }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');
                handoff(data);
            } catch (err) {
                showNotice(err.message);
                setLoading(false, 'Sign In');
            }
        }

        async function doRegister() {
            const name     = document.getElementById('s-name').value.trim();
            const email    = document.getElementById('s-reg-email').value.trim();
            const password = document.getElementById('s-reg-password').value;
            if (!name || !email || !password) { showNotice('All fields are required.'); return; }
            if (password.length < 6) { showNotice('Password must be at least 6 characters.'); return; }

            setLoading(true, 'Create Account');
            try {
                const res  = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed');
                handoff(data);
            } catch (err) {
                showNotice(err.message);
                setLoading(false, 'Create Account');
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventFlow — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        .login-brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 8px;
        }

        .login-tagline {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--ink3);
            margin-bottom: 48px;
            text-align: center;
        }

        .role-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
            max-width: 520px;
        }

        .role-card {
            background: var(--paper);
            border: 1px solid var(--rule);
            border-radius: var(--radius);
            padding: 32px 24px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            display: block;
        }

        .role-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .role-card.student:hover { border-color: var(--accent2); }
        .role-card.admin:hover   { border-color: var(--amber); }

        .role-card-icon {
            font-size: 2.2rem;
            margin-bottom: 14px;
            display: block;
        }

        .role-card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .role-card-sub {
            font-size: 0.78rem;
            color: var(--ink3);
            line-height: 1.5;
        }

        .role-card-arrow {
            display: inline-block;
            margin-top: 18px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--rule);
            color: var(--ink3);
            transition: all 0.18s;
        }

        .role-card.student:hover .role-card-arrow {
            background: var(--accent2);
            color: white;
            border-color: var(--accent2);
        }

        .role-card.admin:hover .role-card-arrow {
            background: var(--amber);
            color: white;
            border-color: var(--amber);
        }

        @media (max-width: 480px) {
            .role-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <div class="brand-name">EventFlow</div>
            <div class="brand-tag">Capacity Manager</div>
        </div>
        <div class="login-tagline">Who are you signing in as?</div>

        <div class="role-cards">
            <a class="role-card student fade-up d1" href="student-login.html">
                <span class="role-card-icon">🎓</span>
                <div class="role-card-title">Student</div>
                <div class="role-card-sub">Browse events, register for sessions, and manage your bookings.</div>
                <span class="role-card-arrow">Sign In →</span>
            </a>
            <a class="role-card admin fade-up d2" href="admin-login.html">
                <span class="role-card-icon">🛡️</span>
                <div class="role-card-title">Admin</div>
                <div class="role-card-sub">Manage events, monitor capacity, and control registrations.</div>
                <span class="role-card-arrow">Sign In →</span>
            </a>
        </div>
    </div>
</body>
</html>
